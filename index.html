<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentScout Kids - Aplikasi Deteksi Bakat Anak</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --accent: #f59e0b;
            --bg-light: #f8fafc;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-light);
            color: #1e293b;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        .glass-header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .check-card {
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid transparent;
        }

        .check-card:has(input:checked) {
            border-color: var(--primary);
            background-color: #ffffff;
            box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.12);
        }

        /* Hubungan CSS untuk Checked State */
        .check-card input:checked + .custom-check {
            background-color: var(--primary);
            border-color: var(--primary);
        }

        .check-card input:checked + .custom-check i {
            transform: scale(1) !important;
            opacity: 1 !important;
        }

        .talent-card {
            background: #ffffff;
            border: 1px solid rgba(226, 232, 240, 0.6);
            transition: transform 0.3s ease;
        }

        .nav-button {
            transition: all 0.3s ease;
        }

        .nav-button.active {
            color: var(--primary);
            transform: translateY(-4px);
        }

        .nav-button.active .nav-icon-bg {
            background-color: #eef2ff;
            color: var(--primary);
        }

        .animate-pop-in {
            animation: popIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .welcome-screen {
            background: radial-gradient(circle at top right, #eef2ff, #f8fafc);
        }

        .loading-overlay {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(4px);
        }

        /* Shake animation untuk error validation */
        .shake {
            animation: shakeKey 0.4s ease-in-out;
        }
        @keyframes shakeKey {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="pb-36">

        <i id="toastIcon" class="fa-solid fa-circle-exclamation text-amber-400 text-base"></i>
        <span id="toastMessage">Harap lengkapi formulir terlebih dahulu.</span>

    <!-- Header Area -->
    <header id="mainHeader" class="glass-header fixed top-0 left-0 right-0 z-50 border-b border-slate-100/50 hidden">

    <main id="mainContent" class="max-w-md mx-auto px-6 pt-24 hidden">

    <!-- Bottom Navbar -->

    <script>

            'Woo': { score: 10, domain: 'Influencing', icon: 'fa-handshake-simple', color: '#b45309', desc: 'Magnet sosial.', advice: 'Beri kesempatan berinteraksi di tempat umum atau lingkungan baru.' },
            'Empathy': { score: 10, domain: 'Relationship', icon: 'fa-heart', color: '#10b981', desc: 'Penuh empati.', advice: 'Latih validasi perasaan.' },

            'Relator': { score: 10, domain: 'Relationship', icon: 'fa-users-between-lines', color: '#059669', desc: 'Sahabat setia.', advice: 'Sediakan waktu Deep Talk khusus berdua saja tanpa gangguan gawai.' },
            'Restorative': { score: 10, domain: 'Executing', icon: 'fa-screwdriver-wrench', color: '#ef4444', desc: 'Problem solver.', advice: 'Sediakan barang-barang bekas aman untuk ia pelajari struktur rusaknya.' },

        };

        // DAFTAR AKTIVITAS HARIAN YANG LEBIH GAMBANG DIAMATI ORANG TUA
        const activityGroups = [
            { name: "Aktivitas Bermain & Berkreasi", color: "indigo", activities: [
                { label: "Suka menyusun mainan (lego/mobil-mobilan) secara berurutan atau dikelompokkan sesuai jenis/warna", cat: "Arranger" },
                { label: "Suka menggambar bebas, mencorat-cret kreatif, atau menciptakan bentuk baru di luar contoh", cat: "Ideation" },
                { label: "Betah berlama-lama merakit mainan yang rumit (seperti puzzle) sampai benar-benar selesai", cat: "Achiever" },
                { label: "Suka mengotak-atik mainan rusak untuk mencari tahu bagaimana cara merakitnya kembali", cat: "Restorative" },
                { label: "Sering membuat aturan mainan baru sendiri ketika merasa bosan dengan aturan yang lama", cat: "Strategic" },
                { label: "Suka mengumpulkan benda-benda unik (seperti batu kerikil, stiker, daun kering) dan menjaganya", cat: "Learner" }
            ]},
            { name: "Rutinitas & Kemandirian Tugas", color: "rose", activities: [
                { label: "Rajin merapikan tempat tidur atau meja belajarnya sendiri tanpa harus diperintah", cat: "Discipline" },
                { label: "Sangat peduli merawat tanaman rumah atau teratur memberi makan hewan petiharaan harian", cat: "Responsibility" },
                { label: "Senang membantu menimbang bahan makanan dapur, mencuci piring, atau menata meja makan", cat: "Arranger" },
                { label: "Terlihat gelisah atau tidak tenang jika ada pekerjaan sekolah/rumah yang belum diselesaikan", cat: "Achiever" },
                { label: "Sangat mandiri memilih pakaian hariannya sendiri dan terlihat sangat yakin dengan seleranya", cat: "Command" },

            ]},
            { name: "Sikap Sosial & Kepedulian Rumah", color: "emerald", activities: [
                { label: "Peka mendatangi dan menghibur anggota keluarga atau teman yang tampak lelah atau sedih", cat: "Empathy" },
                { label: "Secara sukarela menawarkan makanan atau membagi mainannya kepada saudara atau teman bermain", cat: "Positivity" },

                { label: "Suka menjadi penengah dan meredakan ketegangan saat saudara atau temannya berselisih", cat: "Strategic" },
                { label: "Sangat berani menyapa tetangga atau menyapa anak lain yang belum dikenal di area bermain", cat: "Woo" },
                { label: "Mudah menyadari perubahan kecil di rumah (misal: posisi pajangan baru atau aroma masakan Ibu)", cat: "Analytical" }

                { label: "Sangat kompetitif saat bermain game keluarga (seperti monopoli/ular tangga) dan bertekad ingin menang", cat: "Competition" },

                { label: "Selalu berulang kali bertanya 'Kenapa ya?' terhadap kejadian-kejadian sepele di sekeliling rumah", cat: "Analytical" }
            ]}
        ];

        // Memuat data lama jika ada
        window.addEventListener('DOMContentLoaded', () => {
            const savedName = localStorage.getItem('ts_child_name');
            const savedClass = localStorage.getItem('ts_child_class');
            if (savedName) document.getElementById('childNameInput').value = savedName;
            if (savedClass) document.getElementById('childClassInput').value = savedClass;
        });

        // Sistem Toast Estetik
        function showToast(message, isSuccess = false) {
            const toast = document.getElementById('toastNotification');
            const msgEl = document.getElementById('toastMessage');
            const iconEl = document.getElementById('toastIcon');
            
            msgEl.innerText = message;
            
            if (isSuccess) {
                toast.classList.remove('bg-slate-900');
                toast.classList.add('bg-emerald-600');
                iconEl.className = "fa-solid fa-circle-check text-white text-base";
            } else {
                toast.classList.remove('bg-emerald-600');
                toast.classList.add('bg-slate-900');
                iconEl.className = "fa-solid fa-circle-exclamation text-amber-400 text-base";
            }
            
            toast.classList.remove('opacity-0', 'pointer-events-none', '-translate-y-4');
            toast.classList.add('opacity-100', 'translate-y-0');
            
            setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', 'pointer-events-none', '-translate-y-4');
            }, 3500);
        }

        function startApp() {
            const nameInput = document.getElementById('childNameInput');
            const classInput = document.getElementById('childClassInput');
            const welcomeContainer = document.getElementById('welcomeContainer');
            
            let hasError = false;

            // Validasi Input Nama
            if (!nameInput.value.trim()) {
                nameInput.classList.add('border-red-500', 'ring-4', 'ring-red-50');
                hasError = true;
            } else {
                nameInput.classList.remove('border-red-500', 'ring-4', 'ring-red-50');
            }

            // Validasi Pilihan Kelas
            if (!classInput.value) {
                classInput.classList.add('border-red-500', 'ring-4', 'ring-red-50');
                hasError = true;
            } else {
                classInput.classList.remove('border-red-500', 'ring-4', 'ring-red-50');
            }

            if (hasError) {
                welcomeContainer.classList.add('shake');
                showToast("Harap masukkan Nama Anak dan pilih Kelas terlebih dahulu!");
                setTimeout(() => welcomeContainer.classList.remove('shake'), 400);
                return;
            }

            childName = nameInput.value.trim();
            childClass = classInput.value;
            
            // Simpan ke local storage
            localStorage.setItem('ts_child_name', childName);
            localStorage.setItem('ts_child_class', childClass);

            // Update UI elements
            document.getElementById('displayChildName').innerText = childName;
            document.getElementById('displayChildClass').innerText = "Kelas " + childClass;
            document.getElementById('headerChildName').innerText = childName;
            document.getElementById('reportChildName').innerText = childName;
            document.getElementById('reportChildClass').innerText = "Kelas " + childClass;

            document.getElementById('welcome').classList.add('hidden');
            document.getElementById('mainHeader').classList.remove('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('bottomNav').classList.remove('hidden');
            renderChecklist();
        }

        function renderChecklist() {
            const container = document.getElementById('checklist-groups');
            container.innerHTML = activityGroups.map((group, groupIdx) => `
                <div>
                    <div class="flex items-center gap-2 mb-4 px-2">
                        <span class="w-1.5 h-4 bg-indigo-500 rounded-full"></span>
                        <h3 class="text-xs font-extrabold text-slate-500 uppercase tracking-widest">${group.name}</h3>
                    </div>
                    <div class="space-y-3">
                        ${group.activities.map((act, actIdx) => `
                            <label class="check-card bg-white p-5 rounded-[1.8rem] flex items-center gap-4 cursor-pointer">
                                <input type="checkbox" onchange="updateActivityByIndex(${groupIdx}, ${actIdx}, this)" class="sr-only">
                                <div class="custom-check w-6 h-6 rounded-lg border-2 border-slate-200 flex items-center justify-center transition-all duration-300 shrink-0">
                                    <i class="fa-solid fa-check text-white text-[10px] opacity-0 transition-all duration-300 transform scale-50"></i>
                                </div>
                                <p class="text-xs font-semibold text-slate-700 leading-relaxed">${act.label}</p>
                            </label>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function updateActivityByIndex(groupIdx, actIdx, checkbox) {
            const act = activityGroups[groupIdx].activities[actIdx];
            const label = act.label;
            const cat = act.cat;

            if (checkbox.checked) {
                if (talents[cat]) talents[cat].score += 30;
                checkedActivities.push(label);
            } else {
                if (talents[cat]) talents[cat].score -= 30;
                checkedActivities = checkedActivities.filter(item => item !== label);
            }
        }

        async function saveAndShowReport() {
            document.getElementById('dbLoader').classList.remove('hidden');

            const top7 = Object.entries(talents)
                .sort((a,b) => b[1].score - a[1].score)
                .slice(0, 7)
                .map(t => t[0])
                .join(', ');

            const payload = {
                timestamp: new Date().toLocaleString('id-ID'),
                nama: childName,
                kelas: childClass,
                aktivitas: checkedActivities.join(', '),
                top_bakat: top7
            };

            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            } catch (e) {
                console.warn("Database tidak merespon, namun data lokal tetap diproses.");
            } finally {
                setTimeout(() => {
                    document.getElementById('dbLoader').classList.add('hidden');
                    showSection('report');
                }, 1200);
            }
        }

        function showSection(id) {
            ['checklist', 'report'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');

            document.querySelectorAll('.nav-button').forEach(btn => {
                btn.classList.remove('active', 'text-slate-300');
                if(!btn.classList.contains('active')) btn.classList.add('text-slate-300');
            });
            document.getElementById('nav-'+id).classList.add('active');
            document.getElementById('nav-'+id).classList.remove('text-slate-300');

            if(id === 'report') renderReport();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Fitur menyalin ke papan klip dengan fallbacks untuk kompatibilitas iframe
        function copyTextToClipboard(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";  // Hindari pengguliran halaman ke bawah
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                document.execCommand('copy');
                showToast("Rangkuman berhasil disalin! Silakan paste di chat WhatsApp Guru.", true);
            } catch (err) {
                showToast("Gagal menyalin otomatis. Silakan cetak PDF laporan.");
            }
            document.body.removeChild(textArea);
        }

        function shareResultToWhatsApp() {
            const sorted = Object.entries(talents)
                .sort((a,b) => b[1].score - a[1].score)
                .slice(0, 3); // Ambil Top 3 Dominan

            let textSummary = `*HASIL OBSERVASI BAKAT ANAK (TALENTSCOUT KIDS)*\n\n`;
            textSummary += `Nama Anak: *${childName}*\n`;
            textSummary += `Kelas: *${childClass}*\n`;
            textSummary += `Waktu Observasi: ${new Date().toLocaleDateString('id-ID')}\n\n`;
            textSummary += `*Top 3 Bakat Alami Dominan:*\n`;
            
            sorted.forEach((t, i) => {
                textSummary += `${i+1}. *${t[0].toUpperCase()}*\n   _${t[1].desc}_\n\n`;
            });

            textSummary += `_Dikirim otomatis oleh orang tua melalui Aplikasi TalentScout Kids._`;

            copyTextToClipboard(textSummary);
        }

        function resetAndBackToHome() {
            checkedActivities = [];
            Object.keys(talents).forEach(key => talents[key].score = 10);
            
            document.getElementById('welcome').classList.remove('hidden');
            document.getElementById('mainHeader').classList.add('hidden');
            document.getElementById('mainContent').classList.add('hidden');
            document.getElementById('bottomNav').classList.add('hidden');
            
            // Fokus kembali ke input
            document.getElementById('childNameInput').value = "";
            document.getElementById('childClassInput').selectedIndex = 0;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        let chartInstance = null;
        function renderReport() {
            try {
                const sorted = Object.entries(talents).sort((a,b) => b[1].score - a[1].score).slice(0, 7);
                const ctx = document.getElementById('talentChart').getContext('2d');
                
                if(chartInstance) chartInstance.destroy();

                chartInstance = new Chart(ctx, {
                    type: 'radar',
                    data: {
                        labels: sorted.map(t => t[0]),
                        datasets: [{
                            data: sorted.map(t => t[1].score),
                            backgroundColor: 'rgba(99, 102, 241, 0.1)',
                            borderColor: '#6366f1',
                            borderWidth: 2,
                            pointBackgroundColor: '#6366f1'
                        }]
                    },
                    options: { 
                        plugins: { legend: { display: false } }, 
                        scales: { 
                            r: { 
                                ticks: { display: false },
                                grid: { color: 'rgba(0,0,0,0.03)' },
                                pointLabels: { font: { size: 9, weight: '700' }, color: '#64748b' }
                            } 
                        } 
                    }
                });

                document.getElementById('top-talents-display').innerHTML = sorted.map((t, i) => `
                    <div class="talent-card p-6 rounded-[2.5rem] animate-pop-in" style="animation-delay: ${i*100}ms">
                        <div class="flex items-center gap-4 mb-3">
                            <div class="w-10 h-10 rounded-xl flex items-center justify-center text-white shrink-0 shadow-md" style="background: ${t[1].color}">
                                <i class="fa-solid ${t[1].icon}"></i>
                            </div>
                            <h4 class="font-bold text-slate-800 uppercase text-xs tracking-wider">${t[0]}</h4>
                        </div>
                        <p class="text-[11px] text-slate-500 font-medium leading-relaxed">${t[1].desc.replace("Ia", childName)}</p>
                        <div class="mt-4 pt-4 border-t border-slate-50">
                            <p class="text-[9px] font-black text-indigo-400 uppercase tracking-widest mb-1">Stimulasi</p>
                            <p class="text-[10px] text-slate-700 font-bold">${t[1].advice}</p>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error("Gagal merender grafik/laporan: ", error);
            }
        }
    </script>
</body>
</html>
